<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      width: 280px;
      color: #1f2937;
    }
    .header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header img {
      width: 20px;
      height: 20px;
    }
    .btn-main {
      display: block;
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin-bottom: 16px;
      box-sizing: border-box;
      transition: background 0.2s;
    }
    .btn-main:hover {
      background: #1d4ed8;
    }
    .links-title {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .badge-link {
      display: block;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: #f3f4f6;
      color: #374151;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid #e5e7eb;
    }
    .badge-link:hover {
      background: #e5e7eb;
      color: #111827;
      border-color: #d1d5db;
    }
    .action-btn {
      display: block;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: #10b981;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }
    .action-btn:hover {
      background: #059669;
    }
    .auditor-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .auditor-box span {
      font-weight: 600;
    }
    #audit-result {
      margin-bottom: 8px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Zapixal">
    Zapixal
  </div>
  
  <div class="auditor-box">
    <div id="audit-result">Analyzing page payload...</div>
    <a id="btn-optimize-deep" href="https://zapixal.com" target="_blank" class="action-btn hidden" style="background:#f59e0b; margin-bottom:0;">Optimize on Zapixal</a>
  </div>

  <button id="btn-extract" class="action-btn">Extract All Webpage Images</button>

  <a href="https://zapixal.com" target="_blank" class="btn-main" style="margin-top: 12px;">Open Full Web Workspace ↗</a>
  
  <div class="links-title">Quick Converters</div>
  <a href="https://zapixal.com/heic-to-jpg" target="_blank" class="badge-link">📄 HEIC to JPG</a>
  <a href="https://zapixal.com/compress-jpeg-under-200kb" target="_blank" class="badge-link">🗜️ Compress JPEG &lt; 200KB</a>
  <a href="https://zapixal.com/exif-metadata-remover" target="_blank" class="badge-link">🔒 EXIF Metadata Remover</a>
  <a href="https://zapixal.com/vs/tinypng" target="_blank" class="badge-link">⚖️ Zapixal vs TinyPNG</a>
  <script src="popup.js"></script>
</body>
</html>
